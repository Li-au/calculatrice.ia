<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Calculatrice</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="calculator-wrapper" id="calculator-wrapper">
    <div class="search-bar">
      <input type="text" id="display" readonly aria-label="Calculatrice" placeholder="Calculer...">
    </div>
    <div class="keypad" id="keypad">
      <button type="button" data-key="7">7</button>
      <button type="button" data-key="8">8</button>
      <button type="button" data-key="9">9</button>
      <button type="button" data-key="÷">÷</button>
      <button type="button" data-key="4">4</button>
      <button type="button" data-key="5">5</button>
      <button type="button" data-key="6">6</button>
      <button type="button" data-key="×">×</button>
      <button type="button" data-key="1">1</button>
      <button type="button" data-key="2">2</button>
      <button type="button" data-key="3">3</button>
      <button type="button" data-key="−">−</button>
      <button type="button" data-key="C" class="key-clear">C</button>
      <button type="button" data-key="backspace" class="key-backspace">⌫</button>
      <button type="button" data-key="%">%</button>
      <button type="button" data-key="+">+</button>
      <button type="button" data-key="0" class="key-zero">0</button>
      <button type="button" data-key="=" class="key-equals">=</button>
    </div>
  </div>
  <script src="src/evaluateExpression.js"></script>
  <script src="script.js"></script>
</body>
</html>
